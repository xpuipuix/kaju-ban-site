<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かぢゅのこ BAN応援サイト</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    /* ヘッダー */
    .header {
      background: #16213e;
      border-bottom: 2px solid #9147ff;
      padding: 16px 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 20px;
      color: #fff;
      font-weight: bold;
    }
    .header .subtitle {
      font-size: 13px;
      color: #aaa;
      margin-top: 4px;
    }

    /* メインレイアウト */
    .main {
      display: flex;
      height: calc(100vh - 64px);
    }

    /* 左：BANカード＋Twitchボタン */
    .left-panel {
      width: 340px;
      min-width: 300px;
      background: #16213e;
      border-right: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
      overflow-y: auto;
    }

    .ban-badge {
      background: #ff4d4d;
      color: white;
      font-size: 12px;
      font-weight: bold;
      padding: 4px 14px;
      border-radius: 20px;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes sparkle { 0%,100%{transform:scale(1) rotate(0deg)} 50%{transform:scale(1.3) rotate(180deg)} }

    .avatar-wrap {
      animation: float 3s ease-in-out infinite;
      margin-bottom: 10px;
    }
    .avatar-img {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #ffb74d;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 2px;
    }
    .sub {
      font-size: 12px;
      color: #888;
      margin-bottom: 14px;
    }

    .message-box {
      background: #0f3460;
      border: 1px solid #1a4a8a;
      border-radius: 12px;
      padding: 12px 16px;
      width: 100%;
      margin-bottom: 12px;
      text-align: center;
    }
    .message-main {
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .message-sub {
      font-size: 13px;
      color: #aac8ff;
      line-height: 1.6;
    }

    .lesson-box {
      background: #2a2000;
      border: 1px solid #ffd54f;
      border-radius: 10px;
      padding: 10px 14px;
      width: 100%;
      margin-bottom: 14px;
    }
    .lesson-title {
      font-size: 10px;
      font-weight: bold;
      color: #ffd54f;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .lesson-text {
      font-size: 12px;
      color: #ffe082;
      line-height: 1.6;
    }

    .countdown-wrap {
      width: 100%;
      margin-bottom: 10px;
    }
    .countdown-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
      margin-bottom: 5px;
    }
    .bar-outer {
      height: 7px;
      background: #2a2a4a;
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #ff9800, #f44336);
      border-radius: 4px;
      transition: width 1s;
    }

    .days-row {
      display: flex;
      gap: 4px;
      width: 100%;
      margin-bottom: 16px;
    }
    .day-chip {
      flex: 1;
      padding: 6px 2px;
      border-radius: 8px;
      font-size: 9px;
      color: #666;
      background: #1e1e3a;
      border: 1px solid #2a2a4a;
      text-align: center;
    }
    .day-chip.done { background: #1a3a1a; border-color: #4caf50; color: #81c784; }
    .day-chip.today { background: #3a2000; border-color: #ffb74d; color: #ffb74d; font-weight: bold; }
    .day-num { font-size: 13px; display: block; margin-bottom: 1px; }

    .twitch-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: #9147ff;
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .twitch-btn:hover { opacity: 0.85; }
    .twitch-icon { width: 18px; height: 18px; fill: white; }

    .sparkles {
      font-size: 16px;
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }
    .sp { animation: sparkle 2s ease-in-out infinite; display: inline-block; }
    .sp:nth-child(2) { animation-delay: 0.3s; }
    .sp:nth-child(3) { animation-delay: 0.6s; }

    /* 右：チャット */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0d0d1a;
    }

    .chat-header {
      background: #16213e;
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a4a;
      font-size: 14px;
      font-weight: bold;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse 2s infinite;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadein 0.3s ease;
    }
    @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #9147ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      font-weight: bold;
      color: white;
    }
    .msg-content {}
    .msg-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 3px;
    }
    .msg-name {
      font-size: 13px;
      font-weight: bold;
      color: #9147ff;
    }
    .msg-time {
      font-size: 10px;
      color: #555;
    }
    .msg-text {
      font-size: 14px;
      color: #ddd;
      line-height: 1.5;
      word-break: break-word;
    }

    .system-msg {
      text-align: center;
      font-size: 11px;
      color: #555;
      padding: 4px 0;
    }

    /* 入力欄 */
    .chat-input-area {
      padding: 12px 16px;
      background: #16213e;
      border-top: 1px solid #2a2a4a;
    }
    .name-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .name-input {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 8px 12px;
      color: #eee;
      font-size: 13px;
      outline: none;
    }
    .name-input:focus { border-color: #9147ff; }
    .name-input::placeholder { color: #444; }

    .msg-row {
      display: flex;
      gap: 8px;
    }
    .msg-input {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #eee;
      font-size: 14px;
      outline: none;
      resize: none;
      height: 42px;
    }
    .msg-input:focus { border-color: #9147ff; }
    .msg-input::placeholder { color: #444; }

    .send-btn {
      background: #9147ff;
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.97); }

    .char-count {
      font-size: 10px;
      color: #555;
      text-align: right;
      margin-top: 4px;
    }
    .char-count.warn { color: #ff7043; }

    /* モバイル対応 */
    @media (max-width: 600px) {
      .main { flex-direction: column; height: auto; }
      .left-panel { width: 100%; border-right: none; border-bottom: 1px solid #2a2a4a; }
      .right-panel { height: 60vh; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>💜 かぢゅのこ BAN応援サイト 💜</h1>
  <div class="subtitle">BAN-SARETA-FAMILY 集合！</div>
</div>

<div class="main">
  <!-- 左パネル -->
  <div class="left-panel">
    <div class="ban-badge" id="ban-badge">🔴 BAN中</div>

    <div class="avatar-wrap">
      <img class="avatar-img" src="kaju.png" alt="かぢゅのこ"
        onerror="this.style.display='none';document.getElementById('avatar-fallback').style.display='flex'">
      <div id="avatar-fallback" style="display:none;width:88px;height:88px;border-radius:50%;background:#4a1a6a;align-items:center;justify-content:center;font-size:36px;">🍣</div>
    </div>

    <div class="name">かぢゅのこ</div>
    <div class="sub">一時的に沈黙中の配信者</div>

    <div class="message-box">
      <div class="message-main" id="main-msg">大丈夫！もうすぐ帰ってくる！</div>
      <div class="message-sub">休んで、充電して、また笑わせてくれ！💜<br>ずっと待っているぞ。サルウェー</div>
    </div>

    <div class="lesson-box">
      <div class="lesson-title">今回の学び</div>
      <div class="lesson-text">次からは <strong>「おとちゃのちんちんでかい」</strong> とは言わないようにしようね！ 約束だよ🤝</div>
    </div>

    <div class="countdown-wrap">
      <div class="countdown-label">
        <span>BAN進捗</span>
        <span>残り <span id="days-left">?</span> 日</span>
      </div>
      <div class="bar-outer">
        <div class="bar-inner" id="progress-bar" style="width:100%"></div>
      </div>
    </div>

    <div class="days-row" id="days-row"></div>

    <a class="twitch-btn" href="https://www.twitch.tv/kentoobeta" target="_blank">
      <svg class="twitch-icon" viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
      kentoobeta を見に行く
    </a>

    <div class="sparkles">
      <span class="sp">✨</span>
      <span class="sp">💜</span>
      <span class="sp">✨</span>
    </div>
  </div>

  <!-- 右パネル：チャット -->
  <div class="right-panel">
    <div class="chat-header">
      <div class="chat-dot"></div>
      応援チャット
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="system-msg">チャットへようこそ！かぢゅのこへの応援メッセージを送ろう💜</div>
    </div>
    <div class="chat-input-area">
      <div class="name-row">
        <input class="name-input" id="name-input" type="text" placeholder="名前（例：ファン太郎）" maxlength="20">
      </div>
      <div class="msg-row">
        <textarea class="msg-input" id="msg-input" placeholder="応援メッセージを入力..." maxlength="200"></textarea>
        <button class="send-btn" onclick="sendMessage()">送信</button>
      </div>
      <div id="warning-msg" style="display:none;font-size:12px;color:#ff7043;background:#3a1a00;border:1px solid #ff7043;border-radius:8px;padding:6px 12px;margin-top:8px;text-align:center;"></div>
      <div class="char-count" id="char-count">0 / 200</div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAthmOYWn6WZdH2NS76e0seNIiAp1PbDq4",
    authDomain: "ban-sareta-family.firebaseapp.com",
    databaseURL: "https://ban-sareta-family-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ban-sareta-family",
    storageBucket: "ban-sareta-family.firebasestorage.app",
    messagingSenderId: "615118145572",
    appId: "1:615118145572:web:5e5d016b7289835da5b0b1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'messages');

  // BANカウントダウン
  const BAN_START = new Date('2026-05-29T00:00:00+09:00');
  const BAN_DAYS = 7;

  function updateCountdown() {
    const now = new Date();
    const elapsed = Math.floor((now - BAN_START) / (1000 * 60 * 60 * 24));
    const todayIndex = Math.min(elapsed, BAN_DAYS - 1);
    const remaining = Math.max(BAN_DAYS - elapsed - 1, 0);
    const pct = ((remaining + 1) / BAN_DAYS) * 100;

    document.getElementById('days-left').textContent = remaining;
    document.getElementById('progress-bar').style.width = pct + '%';

    const badge = document.getElementById('ban-badge');
    if (elapsed >= BAN_DAYS) {
      badge.textContent = '🟢 BAN解除！おかえり！';
      badge.style.background = '#4caf50';
      document.getElementById('main-msg').textContent = 'おかえり！待ってたよ！💜';
    } else {
      badge.textContent = `🔴 BAN中 — ${elapsed + 1}日目 / ${BAN_DAYS}日間`;
    }

    // 日チップ
    const row = document.getElementById('days-row');
    row.innerHTML = '';
    for (let i = 0; i < BAN_DAYS; i++) {
      const chip = document.createElement('div');
      chip.className = 'day-chip' + (i < elapsed ? ' done' : i === elapsed ? ' today' : '');
      chip.innerHTML = `<span class="day-num">${i < elapsed ? '✓' : i === elapsed ? '📺' : (i + 1)}</span>${i + 1}日目`;
      row.appendChild(chip);
    }
  }
  updateCountdown();

  // チャット受信
  onValue(messagesRef, (snapshot) => {
    const container = document.getElementById('chat-messages');
    container.innerHTML = '<div class="system-msg">チャットへようこそ！かぢゅのこへの応援メッセージを送ろう💜</div>';
    const msgs = [];
    snapshot.forEach(child => msgs.push({ id: child.key, ...child.val() }));
    msgs.slice(-100).forEach(m => {
      const el = document.createElement('div');
      el.className = 'msg';
      const initial = (m.name || '?')[0].toUpperCase();
      const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) : '';
      el.innerHTML = `
        <div class="msg-avatar">${initial}</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-name">${escHtml(m.name || '名無し')}</span>
            <span class="msg-time">${time}</span>
          </div>
          <div class="msg-text">${escHtml(m.text || '')}</div>
        </div>`;
      container.appendChild(el);
    });
    container.scrollTop = container.scrollHeight;
  });

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ===== 荒らし対策の設定 =====
  const NG_WORDS = ['死ね', '殺す', 'きもい', 'うざい', 'ブス', 'デブ', 'ばか', 'アホ', 'クズ', 'カス', 'fuck', 'shit', 'バカ'];
  const COOLDOWN_MS = 5000;      // 連投制限：5秒に1回
  const MAX_LENGTH = 200;        // 最大文字数
  let lastSentTime = 0;          // 最後に送信した時刻
  let lastSentText = '';         // 最後に送信した内容

  function showWarning(msg) {
    const el = document.getElementById('warning-msg');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
    clearTimeout(el._timer);
    el._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  // 送信
  window.sendMessage = function() {
    const name = document.getElementById('name-input').value.trim() || '名無し';
    const text = document.getElementById('msg-input').value.trim();

    // 空チェック
    if (!text) return;

    // 長さ制限
    if (text.length > MAX_LENGTH) {
      showWarning(`メッセージは${MAX_LENGTH}文字までだよ`);
      return;
    }

    // 連投制限（クールダウン）
    const now = Date.now();
    if (now - lastSentTime < COOLDOWN_MS) {
      const wait = Math.ceil((COOLDOWN_MS - (now - lastSentTime)) / 1000);
      showWarning(`連投はダメ！あと${wait}秒待ってね`);
      return;
    }

    // 同じメッセージの連投禁止
    if (text === lastSentText) {
      showWarning('同じメッセージは送れないよ');
      return;
    }

    // NGワードフィルター
    const lower = text.toLowerCase();
    const hit = NG_WORDS.find(w => lower.includes(w.toLowerCase()));
    if (hit) {
      showWarning('その言葉は使えないよ。やさしい言葉でね💜');
      return;
    }

    // 全部OK → 送信
    push(messagesRef, { name, text, timestamp: Date.now() });
    lastSentTime = now;
    lastSentText = text;
    document.getElementById('msg-input').value = '';
    document.getElementById('char-count').textContent = '0 / 200';
  };

  // 文字数カウント
  document.getElementById('msg-input').addEventListener('input', function() {
    const len = this.value.length;
    const el = document.getElementById('char-count');
    el.textContent = `${len} / 200`;
    el.className = 'char-count' + (len > 180 ? ' warn' : '');
  });

  // Enterで送信
  document.getElementById('msg-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMessage(); }
  });
</script>

</body>
</html>
